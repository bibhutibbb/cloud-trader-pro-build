services:
  backend-api:
    image: ghcr.io/bibhutibbb/cloudtraderpro-backend:latest
    hostname: cloudtraderpro-server
    restart: always
    expose:
      - "8002"
    volumes:
      # Persist configuration and license activations so they survive container updates
      - ./configs:/app/configs
      # Mount host's stable machine-id to prevent licensing issues on container restarts
      - /etc/machine-id:/etc/machine-id:ro
      # Persist application logs on the host machine for review
      - ./logs:/app/logs
      # Persist downloaded symbol masters to avoid redownloading on reboots
      - ./symbolmaster:/app/symbolmaster
      # Persist historicaldatas download location
      - ./datafetcher/historicaldatas:/app/datafetcher/historicaldatas
      # Persist Backtesting folder location
      - ./backtester/backtest_histories:/app/backtester/backtest_histories
      # Mount docker socket to allow the backend to read its own container image digest
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Asia/Kolkata
      - WATCHTOWER_TOKEN=super-secret-watchtower-token
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend-nginx:
    image: ghcr.io/bibhutibbb/cloudtraderpro-frontend:latest
    restart: always
    ports:
      - "8002:80"
    depends_on:
      - backend-api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Asia/Kolkata
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=super-secret-watchtower-token
      - WATCHTOWER_CLEANUP=true
