server {
    listen 80;
    server_name localhost;

    # Serve static files directly from the Nginx container's local directory
    location /css/ {
        root /usr/share/nginx/html;
    }
    location /js/ {
        root /usr/share/nginx/html;
    }
    location /img/ {
        root /usr/share/nginx/html;
    }
    location /favicon/ {
        root /usr/share/nginx/html;
    }

    # Serve static HTML files directly
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }
    location = /index.html {
        root /usr/share/nginx/html;
    }
    location = /backtest.html {
        root /usr/share/nginx/html;
    }
    location = /chart.html {
        root /usr/share/nginx/html;
    }
    location = /lock.html {
        root /usr/share/nginx/html;
    }

    # Proxy WebSocket connections (e.g. tick feed, logs, PnL updates)
    location /ws {
        proxy_pass http://backend-api:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Proxy health checks
    location /health {
        proxy_pass http://backend-api:8002/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy all other routes (APIs, auth, configs, database operations) to the FastAPI backend
    location / {
        proxy_pass http://backend-api:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
